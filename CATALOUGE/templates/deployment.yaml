apiVersion: apps/v1
kind: Deployment

metadata:
  name: "{{ .Values.deployment.deploymentName }}"
  namespace: "{{ .Values.deployment.namespace }}"

  labels:
    app: "{{ .Values.deployment.deploymentName }}"
    project: roboshop
    environment: dev
    purpose: poc

spec:
  replicas: {{ .Values.deployment.replicas }}

  selector:
    matchLabels:
      app: "{{ .Values.deployment.deploymentName }}"
      project: roboshop
      environment: dev
      purpose: poc

  template:
    metadata:
      labels:
        app: "{{ .Values.deployment.deploymentName }}"
        project: roboshop
        environment: dev
        purpose: poc

      annotations:
        kubernetes.io/change-cause: "{{ .Values.deployment.changecause }}"

    spec:
      containers:
        - name: "{{ .Values.container.name }}"
          image: "{{ .Values.deployment.imageVersion }}"

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: "{{ .Values.service.name }}"